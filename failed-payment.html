<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Payment Cancelled</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      color:#222;
    }

    .card{
      background:#fff;
      max-width:600px;
      width:90%;
      border-radius:16px;
      padding:40px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    .icon{
      width:90px;
      height:90px;
      background:#fee2e2;
      color:#dc2626;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      margin:0 auto 20px;
    }

    h1{
      margin-top:0;
      color:#111827;
    }

    p{
      line-height:1.7;
      color:#4b5563;
    }

    .warning{
      background:#fff7ed;
      border-left:5px solid #f97316;
      padding:18px;
      border-radius:10px;
      margin-top:25px;
      text-align:left;
    }

    .btn{
      display:inline-block;
      margin-top:30px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      padding:14px 24px;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    .small{
      font-size:13px;
      color:#6b7280;
      margin-top:20px;
    }

  </style>
</head>

<body>

<div class="card">

  <div class="icon">
    ✕
  </div>

  <h1>Payment Cancelled</h1>

  <p>
    Your payment was cancelled or not completed.
  </p>

  <div class="warning">

    <strong>Important Reminder</strong><br><br>

    Please make sure you fully understand the product,
    associated risks, and Terms of Service before
    attempting another purchase.

  </div>

  <p class="small">
    No payment has been processed.
  </p>

  <a href="/" class="btn">
    Return to Checkout
  </a>

</div>

</body>
</html>
